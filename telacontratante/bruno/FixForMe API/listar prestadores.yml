info:
  name: listar prestadores
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:8080/prestadores/buscar?descricao=eletric
  params:
    - name: descricao
      value: eletric
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
